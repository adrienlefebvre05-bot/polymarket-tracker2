# Save this file to: .github/workflows/polymarket-sync.yml in your repo

name: Sync Polymarket sports volume

on:
  schedule:
    # Runs daily at 04:00 UTC/GMT, so it's ready when you log in.
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run sync script
        run: node fetch-and-upsert.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
