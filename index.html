<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biggest open sports bets</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0A0D11;
    color: #E7ECF0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #8A94A0; margin: 0 0 16px; }
  .status { font-size: 13px; color: #5C6773; margin-bottom: 16px; }
  .chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
  .chip {
    flex-shrink: 0; font-size: 12px; padding: 6px 12px; border-radius: 999px;
    border: 1px solid #262C34; background: #12171D; color: #8A94A0; cursor: pointer;
  }
  .chip.active { background: #E7ECF0; color: #0A0D11; }
  .card { background: #12171D; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .rank { font-size: 11px; color: #5C6773; margin-bottom: 4px; }
  .card-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
  .title { font-size: 13px; line-height: 1.4; flex: 1; }
  .sport-badge {
    font-size: 10px; background: #171D25; color: #8FAAD9; padding: 3px 8px;
    border-radius: 4px; flex-shrink: 0; white-space: nowrap;
  }
  .card-bottom { display: flex; justify-content: space-between; align-items: baseline; margin-top: 6px; font-size: 13px; }
  .value { font-weight: 600; font-size: 15px; }
  .meta { color: #5C6773; font-size: 12px; }
  .wallet { font-family: monospace; color: #8FAAD9; }
  .outcome-yes { color: #2FD675; }
  .outcome-no { color: #FF5C5C; }
  .error { color: #FF8A5C; background: #1A1210; border: 1px solid #4A2A20; padding: 12px; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body>
  <h1>Biggest open sports bets</h1>
  <p class="sub">Largest wallet positions still open on Polymarket sports markets, synced daily</p>
  <div id="status" class="status">Loading…</div>
  <div id="chips" class="chips"></div>
  <div id="list"></div>

<script>
const SUPABASE_URL = "https://yqhqsoskqleseoblpflq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_YkmQIRmPGCUsAJg0srzPGA_Swj6zC_X";

function fmtUSD(n) {
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
  if (n >= 1000) return "$" + (n / 1000).toFixed(1) + "K";
  return "$" + Math.round(n);
}

function shortWallet(w) {
  if (!w) return "unknown";
  return w.slice(0, 6) + "…" + w.slice(-4);
}

let allBets = [];
let sportFilter = "All";

function render() {
  const chipsEl = document.getElementById("chips");
  const listEl = document.getElementById("list");
  const statusEl = document.getElementById("status");

  const sports = ["All", ...new Set(allBets.map((r) => r.sport))].sort((a, b) =>
    a === "All" ? -1 : a.localeCompare(b)
  );
  chipsEl.innerHTML = sports
    .map(
      (s) =>
        '<button class="chip' + (s === sportFilter ? " active" : "") + '" data-sport="' + s + '">' + s + "</button>"
    )
    .join("");
  chipsEl.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => {
      sportFilter = btn.dataset.sport;
      render();
    });
  });

  const filtered = allBets.filter((r) => sportFilter === "All" || r.sport === sportFilter);
  statusEl.textContent = filtered.length + " open positions" + (filtered[0] ? " · latest snapshot " + filtered[0].snapshot_date : "");

  listEl.innerHTML =
    filtered
      .slice(0, 50)
      .map((r, i) => {
        const outcomeClass = /yes/i.test(r.outcome) ? "outcome-yes" : /no/i.test(r.outcome) ? "outcome-no" : "";
        return (
          '<div class="card"><div class="rank">#' +
          (i + 1) +
          '</div><div class="card-top"><span class="title">' +
          r.market_title +
          '</span><span class="sport-badge">' +
          r.sport +
          '</span></div><div class="card-bottom"><span class="value">' +
          fmtUSD(r.usd_value) +
          '</span><span class="meta">' +
          '<span class="' + outcomeClass + '">' + r.outcome + "</span> · " +
          '<span class="wallet">' + shortWallet(r.wallet) + "</span>" +
          (r.wallet_name ? " (" + r.wallet_name + ")" : "") +
          "</span></div></div>"
        );
      })
      .join("") || '<div style="color:#5C6773; text-align:center; padding:40px 0;">No positions match this filter.</div>';
}

async function load() {
  const statusEl = document.getElementById("status");
  try {
    const url =
      SUPABASE_URL +
      "/rest/v1/pm_sports_top_bets?select=*&order=snapshot_date.desc,usd_value.desc&limit=500";
    const res = await fetch(url, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) throw new Error("Supabase returned " + res.status);
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error("No data yet — check the GitHub Action has run.");

    const latestDate = data[0].snapshot_date;
    allBets = data.filter((r) => r.snapshot_date === latestDate);

    render();
  } catch (e) {
    statusEl.innerHTML = '<div class="error">Couldn\'t load: ' + e.message + "</div>";
  }
}

load();
</script>
</body>
</html>
