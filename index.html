<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sports Volume Tape</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #0A0D11;
    color: #E7ECF0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #8A94A0; margin: 0 0 16px; }
  .status { font-size: 13px; color: #5C6773; margin-bottom: 16px; }
  .chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
  .chip {
    flex-shrink: 0; font-size: 12px; padding: 6px 12px; border-radius: 999px;
    border: 1px solid #262C34; background: #12171D; color: #8A94A0; cursor: pointer;
  }
  .chip.active { background: #E7ECF0; color: #0A0D11; }
  .card { background: #12171D; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .card-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
  .title { font-size: 13px; line-height: 1.4; flex: 1; }
  .sport-badge {
    font-size: 10px; background: #171D25; color: #8FAAD9; padding: 3px 8px;
    border-radius: 4px; flex-shrink: 0; white-space: nowrap;
  }
  .card-bottom { display: flex; justify-content: space-between; margin-top: 6px; font-size: 13px; }
  .vol { font-weight: 600; }
  .vol-label { color: #5C6773; font-weight: 400; }
  .delta-up { color: #2FD675; }
  .delta-down { color: #FF5C5C; }
  .delta-new { color: #FFB020; }
  .delta-none { color: #3A424C; }
  .error { color: #FF8A5C; background: #1A1210; border: 1px solid #4A2A20; padding: 12px; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body>
  <h1>Sports Volume Tape</h1>
  <p class="sub">Polymarket sports markets ranked by 24h volume, synced daily via GitHub Action</p>
  <div id="status" class="status">Loading…</div>
  <div id="chips" class="chips"></div>
  <div id="list"></div>

<script>
const SUPABASE_URL = "https://yqhqsoskqleseoblpflq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_YkmQIRmPGCUsAJg0srzPGA_Swj6zC_X";

function fmtUSD(n) {
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
  if (n >= 1000) return "$" + (n / 1000).toFixed(1) + "K";
  return "$" + Math.round(n);
}

let currentRows = [];
let prevMap = {};
let prevDate = null;
let sportFilter = "All";

function render() {
  const chipsEl = document.getElementById("chips");
  const listEl = document.getElementById("list");
  const statusEl = document.getElementById("status");

  const sports = ["All", ...new Set(currentRows.map((r) => r.sport))].sort((a, b) =>
    a === "All" ? -1 : a.localeCompare(b)
  );
  chipsEl.innerHTML = sports
    .map(
      (s) =>
        '<button class="chip' + (s === sportFilter ? " active" : "") + '" data-sport="' + s + '">' + s + "</button>"
    )
    .join("");
  chipsEl.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => {
      sportFilter = btn.dataset.sport;
      render();
    });
  });

  const filtered = currentRows.filter((r) => sportFilter === "All" || r.sport === sportFilter);
  statusEl.textContent =
    filtered.length + " markets" + (prevDate ? " · vs " + prevDate : " · first day, no comparison yet");

  listEl.innerHTML =
    filtered
      .slice(0, 50)
      .map((r) => {
        const prev = prevMap[r.slug];
        const delta = prev ? r.volume_24hr - prev.volume_24hr : null;
        let deltaHtml;
        if (!prevDate) deltaHtml = '<span class="delta-none">—</span>';
        else if (!prev) deltaHtml = '<span class="delta-new">new</span>';
        else if (delta >= 0) deltaHtml = '<span class="delta-up">▲ ' + fmtUSD(delta) + "</span>";
        else deltaHtml = '<span class="delta-down">▼ ' + fmtUSD(Math.abs(delta)) + "</span>";

        return (
          '<div class="card"><div class="card-top"><span class="title">' +
          r.title +
          '</span><span class="sport-badge">' +
          r.sport +
          '</span></div><div class="card-bottom"><span class="vol">' +
          fmtUSD(r.volume_24hr) +
          ' <span class="vol-label">24h</span></span><span>' +
          deltaHtml +
          "</span></div></div>"
        );
      })
      .join("") || '<div style="color:#5C6773; text-align:center; padding:40px 0;">No markets match this filter.</div>';
}

async function load() {
  const statusEl = document.getElementById("status");
  try {
    const since = new Date();
    since.setDate(since.getDate() - 14);
    const sinceStr = since.toISOString().slice(0, 10);
    const url =
      SUPABASE_URL +
      "/rest/v1/pm_sports_snapshots?select=*&snapshot_date=gte." +
      sinceStr +
      "&order=snapshot_date.desc,volume_24hr.desc";
    const res = await fetch(url, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) throw new Error("Supabase returned " + res.status);
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) throw new Error("No data yet — check the GitHub Action has run.");

    const byDate = {};
    data.forEach((r) => {
      (byDate[r.snapshot_date] = byDate[r.snapshot_date] || []).push(r);
    });
    const dates = Object.keys(byDate).sort().reverse();
    const currentDate = dates[0];
    prevDate = dates[1] || null;
    currentRows = byDate[currentDate].sort((a, b) => b.volume_24hr - a.volume_24hr);
    prevMap = {};
    if (prevDate) byDate[prevDate].forEach((r) => (prevMap[r.slug] = r));

    render();
  } catch (e) {
    statusEl.innerHTML = '<div class="error">Couldn\'t load: ' + e.message + "</div>";
  }
}

load();
</script>
</body>
</html>
